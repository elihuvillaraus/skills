# Installation Methods
installation_methods:
  claude:
    description: "Claude/OpenCode users"
    method: "skill load <skill-name>"
    example: "skill load architect"
    
  gpt:
    description: "ChatGPT/OpenAI users"
    method: "Copy skill raw content from GitHub, paste into chat"
    example: |
      Use this skill: https://raw.githubusercontent.com/elihuvillaraus/skills/main/architect/SKILL.md
      Then execute: plan this feature
    
  gemini:
    description: "Google Gemini users"
    method: "Upload skill file from raw GitHub URL or local copy"
    example: "[upload architect/SKILL.md] Use this skill to plan a feature"
    
  local:
    description: "Local models (Llama, Mistral, etc.)"
    method: "Include skill content in system prompt"
    example: "cat architect/SKILL.md | prepend to your prompt"
    
  api:
    description: "API users (any platform)"
    method: "Include skill content in request messages"
    example: "POST /v1/messages with skill in system_prompt"

