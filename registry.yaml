# How to Use This Registry
usage_guide: |
  ## Load Skills Locally
  
  ### Clone the repository
  ```bash
  git clone https://github.com/elihuvillaraus/skills.git
  cd skills
  ```
  
  ### Use with Claude/OpenCode
  ```bash
  skill load architect
  /orchestrator go
  /tester run tests
  ```
  
  ### Use with GPT
  1. Copy raw skill from: https://raw.githubusercontent.com/elihuvillaraus/skills/main/architect/SKILL.md
  2. Paste into ChatGPT
  3. Reference in your prompt
  
  ### Use with Gemini
  1. Upload skill file
  2. Reference in prompt: "Use this skill to..."
  
  ### Use with Local Models
  ```bash
  cat architect/SKILL.md | prepend_to_prompt
  # Then ask: "Use this skill to plan a feature"
  ```
  
  ## Version All Skills
  
  Each skill follows semantic versioning:
  - 1.0 = stable, production ready
  - 1.x = bug fixes, backward compatible
  - 2.0+ = major changes, breaking changes
  
  Check SKILL.md version field for latest.

