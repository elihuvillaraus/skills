# Contributing
contributing: |
  ## To Update a Skill
  
  1. Edit the skill's SKILL.md file
  2. Update version number in frontmatter
  3. Describe changes in commit message
  4. Push to main branch
  5. Registry auto-updates
  
  ## To Add a New Skill
  
  1. Create folder: `new-skill/`
  2. Add `SKILL.md` with frontmatter
  3. Follow model-agnostic standard
  4. Add to this registry.yaml
  5. Submit PR
  
  ## Quality Standards
  
  - All skills must work with: Claude, GPT, Gemini, Llama
  - Include explicit tool-access branches
  - Clear phase-based structure
  - Structured output format
  - Include examples
